spring.datasource.url=jdbc:mysql://localhost:3306/Paragrein
spring.datasource.username=root
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:paragrein-dev-jwt-secret-change-this-to-strong-key-2026}
jwt.expiration-ms=86400000

app.frontend.reset-url=http://localhost:5173/reset-password

# Email domain validation toggle
# false = local/offline friendly (old behavior)
# true  = strict mode (reject unreachable/non-existing domains via DNS lookup)
app.auth.strict-email-domain-validation=true

# Gmail SMTP configuration (set as environment variables before starting backend)
# MAIL_USERNAME=yourgmail@gmail.com
# MAIL_APP_PASSWORD=your-16-char-google-app-password
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.admin.seed-enabled=false
app.admin.email=admin@gmail.com
app.admin.password=admin1234
app.admin.username=System Admin
app.admin.nic=ADMIN0001
app.admin.phone=0000000000
